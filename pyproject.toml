[project]
name = "partimorph"
version = "0.1.0"
description = "Particle shape analysis tool including Wadell roundness, circularity, and sphericity."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "scipy",
    "opencv-python",
    "scikit-image",
    "matplotlib",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
